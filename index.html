<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Очередь в первый класс, ботаника</title>

  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #000;
      --subtext: #666;
      --good: #34c759;
      --mid: #ff9500;
      --bad: #ff3b30;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --card: #1c1c1e;
        --text: #fff;
        --subtext: #aaa;
      }
    }

    body {
      margin: 0;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, Arial;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h2 {
      font-size: 22px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
      margin-bottom: 12px;
      cursor: pointer;
    }

    #list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    @media (min-width: 600px) {
      #list {
        grid-template-columns: repeat(4, 1fr);
      }

      button {
        width: auto;
        padding: 10px 24px;
      }
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin: 4px 0;
    }

    .name {
      font-weight: 600;
      font-size: 18px;
    }

    .pos.good { color: var(--good); font-weight: bold; }
    .pos.mid { color: var(--mid); }
    .pos.bad { color: var(--bad); font-weight: bold; }

    .small {
      font-size: 13px;
      color: var(--subtext);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-row input {
      flex: 1;
      max-width: 280px;
      padding: 8px 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: var(--card);
      color: var(--text);
      outline: none;
    }

    @media (prefers-color-scheme: dark) {
      .input-row input { border-color: #444; }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Очередь в первый класс, ботаника</h2>

  <div class="input-row">
    <label for="target-input" class="small">Номер заявления</label>
    <input id="target-input" type="text" placeholder="177Г65Б..." spellcheck="false" autocomplete="off" />
  </div>

  <div id="updated" class="small"></div>

  <div id="list"></div>

  <div id="btn-row" style="margin-top:12px">
    <button onclick="loadData()">Обновить</button>
  </div>
</div>

<script>
const input = document.getElementById("target-input");
const urlTarget = new URLSearchParams(location.search).get("target");
if (urlTarget) {
  input.value = urlTarget.trim();
  localStorage.setItem("target", input.value);
} else {
  input.value = localStorage.getItem("target") || "";
}
input.addEventListener("input", () => {
  const val = input.value.trim();
  localStorage.setItem("target", val);
  const params = new URLSearchParams(location.search);
  if (val) params.set("target", val); else params.delete("target");
  history.replaceState(null, "", params.size ? "?" + params : location.pathname);
  document.querySelector("#btn-row button").textContent = "Найти по номеру заявления";
});

function getTarget() { return input.value.trim(); }

const schools = [
  { name: "Школа 200", id: "eee15c16-86e5-4a33-c772-cebb831d56c2", capacity: 120 },
  { name: "Полифорум 180", id: "67572ad9-2adc-4ae8-9661-8c21e51d9ba8", capacity: 180 },
  { name: "Школа 32", id: "9eda7bea-abd2-4c45-e2b1-4378e24e5fbe", capacity: 120 },
  { name: "Гимназия 177", id: "75f81bdf-5401-4386-e924-dcbb8a7b4da4", capacity: 120 },
  { name: "Школа 197", id: "0a498919-0fcf-45f2-af29-6da3ebab140b", capacity: 60 }
];

function calculateGroups(numbers) {
  let indices = [0];

  for (let i = 1; i < numbers.length; i++) {
    if (numbers[i] < numbers[i - 1]) {
      indices.push(i);
    }
  }

  indices.push(numbers.length);

  let sizes = [];

  for (let i = 0; i < indices.length - 1; i++) {
    sizes.push(indices[i + 1] - indices[i]);
  }

  return sizes;
}

async function loadData() {
  const list = document.getElementById("list");
  const btn = document.getElementById("btn-row");
  list.innerHTML = "";
  btn.hidden = true;

  document.getElementById("updated").textContent =
    "Обновлено: " + new Date().toLocaleString();

  for (const school of schools) {
    try {
      const res = await fetch(
        `https://edu-inform.ekadm.ru/api/queue?schoolId=${school.id}`
      );

      const data = await res.json();

      const total = data.count;
      const numbers = data.items.map(i => i.declarationNumber);

      const index = numbers.findIndex(n => n === getTarget());
      const position = index !== -1 ? index + 1 : "-";

      const groups = calculateGroups(numbers);

      let g = [0, 0, 0, 0];
      groups.forEach((v, i) => g[4 - groups.length + i] = v);

      let targetGroup = -1;
      if (index !== -1) {
        let cum = 0;
        for (let i = 0; i < groups.length; i++) {
          cum += groups[i];
          if (index < cum) { targetGroup = 4 - groups.length + i; break; }
        }
      }

      let posClass = "mid";
      if (position !== "-") {
        posClass = position < school.capacity ? "good" : "bad";
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="name">${school.name}</div>

        ${position !== "-" ? `<div class="row">
          <span>Позиция</span>
          <span class="pos ${posClass}">${position}</span>
        </div>` : ""}

        <div class="row">
          <span>Мест</span>
          <span>${school.capacity}</span>
        </div>

        <div class="row">
          <span>Заявлений</span>
          <span>${total}</span>
        </div>

        <div class="row small">
          <span title="Внеоч. / Первооч. / Братья и сестры / Без льгот" style="cursor:help;border-bottom:1px dashed var(--subtext)">Группы</span>
          <span>${g.map((v, i) => i === targetGroup ? `<b class="pos ${posClass}">${v}</b>` : v).join("/")}</span>
        </div>
      `;

      list.appendChild(card);

    } catch (e) {
      const error = document.createElement("div");
      error.className = "card";
      error.textContent = school.name + " — ошибка";
      list.appendChild(error);
    }
  }

  btn.hidden = false;
  document.querySelector("#btn-row button").textContent = "Обновить";
}

loadData();
</script>

</body>
</html>
